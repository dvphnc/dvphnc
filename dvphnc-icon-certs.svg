<svg width="24" height="24" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="certGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4d9fff;stop-opacity:1">
        <animate attributeName="stop-color" values="#4d9fff;#80c0ff;#4d9fff" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#80c0ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#80c0ff;#4d9fff;#80c0ff" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <!-- Circle -->
  <circle cx="12" cy="8" r="5" fill="none" stroke="url(#certGrad)" stroke-width="2" stroke-dasharray="32" stroke-dashoffset="32">
    <animate attributeName="stroke-dashoffset" values="32;0;0;32;32" keyTimes="0;0.3;0.5;0.8;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0 0 1 1;0.42 0 0.58 1;1 1 1 1"/>
  </circle>
  <!-- Ribbon left -->
  <path d="M 8 14.5 L 6 22" fill="none" stroke="url(#certGrad)" stroke-width="2" stroke-linecap="round" stroke-dasharray="10" stroke-dashoffset="10">
    <animate attributeName="stroke-dashoffset" values="10;0;0;10;10" keyTimes="0;0.3;0.5;0.8;1" begin="0.3s" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0 0 1 1;0.42 0 0.58 1;1 1 1 1"/>
  </path>
  <!-- Ribbon right -->
  <path d="M 16 14.5 L 18 22" fill="none" stroke="url(#certGrad)" stroke-width="2" stroke-linecap="round" stroke-dasharray="10" stroke-dashoffset="10">
    <animate attributeName="stroke-dashoffset" values="10;0;0;10;10" keyTimes="0;0.3;0.5;0.8;1" begin="0.4s" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0 0 1 1;0.42 0 0.58 1;1 1 1 1"/>
  </path>
  <!-- Center star dot -->
  <circle cx="12" cy="8" r="1.5" fill="url(#certGrad)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.4;0.8;1" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
