<svg width="100%" height="3" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#001a5e;stop-opacity:1"/>
      <stop offset="50%"  style="stop-color:#003087;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#001a5e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4d9fff;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0;0.3;0.6;1;0.6;0.3;0;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="25%" style="stop-color:#80c0ff;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0.3;0.6;1;0.6;0.3;0;0;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#4d9fff;stop-opacity:1">
        <animate attributeName="stop-opacity" values="1;0.6;0.3;0;0;0;0.3;0.6;1" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" style="stop-color:#80c0ff;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0;0;0;0.3;0.6;1;0.6;0.3" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#4d9fff;stop-opacity:0">
        <animate attributeName="stop-opacity" values="0;0;0;0;0.3;0.6;1;0.6;0.3" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur1"/>
      <feColorMatrix in="blur1" type="matrix" values="2 0 0 0 0  0 2 0 0 0  0 0 2 0 0  0 0 0 2.5 0" result="glow1"/>
      <feGaussianBlur in="glow1" stdDeviation="3" result="blur2"/>
      <feColorMatrix in="blur2" type="matrix" values="2 0 0 0 0  0 2 0 0 0  0 0 2 0 0  0 0 0 2 0" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="3" fill="url(#baseGrad)"/>
  <rect width="100%" height="3" fill="url(#pulseGrad)" filter="url(#glow)"/>
</svg>
