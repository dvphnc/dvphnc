<svg width="24" height="24" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="statsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4d9fff;stop-opacity:1">
        <animate attributeName="stop-color" values="#4d9fff;#80c0ff;#4d9fff" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#80c0ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#80c0ff;#4d9fff;#80c0ff" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <rect x="4" y="14" width="3" height="6" rx="1.5" fill="url(#statsGrad)">
    <animate attributeName="height" values="6;10;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="14;10;14" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="10.5" y="10" width="3" height="10" rx="1.5" fill="url(#statsGrad)">
    <animate attributeName="height" values="10;14;10" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="10;6;10" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="17" y="6" width="3" height="14" rx="1.5" fill="url(#statsGrad)">
    <animate attributeName="height" values="14;16;14" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="6;4;6" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
</svg>
