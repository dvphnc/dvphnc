name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: dvphnc
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=4d9fff&color_dots[0]=161b22&color_dots[1]=003087&color_dots[2]=0044cc&color_dots[3]=4d9fff&color_dots[4]=80c0ff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=4d9fff&color_dots[0]=161b22&color_dots[1]=003087&color_dots[2]=0044cc&color_dots[3]=4d9fff&color_dots[4]=80c0ff

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          force_orphan: true
