name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: dvphnc
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=4d9fff&color_dots[0]=0d1117&color_dots[1]=003087&color_dots[2]=0044cc&color_dots[3]=4d9fff&color_dots[4]=80c0ff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=4d9fff&color_dots[0]=0d1117&color_dots[1]=003087&color_dots[2]=0044cc&color_dots[3]=4d9fff&color_dots[4]=80c0ff

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
